    <div class="stars stars1"></div>

<section class="benefits">
    <h1 class="benefits-title">Quyền lợi khi tham gia sự kiện</h1>


<div class="filter-box">
    
    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Nhập tên sự kiện..."
    >

    <select id="benefitFilter">
        <option value="">Tất cả quyền lợi</option>
        <option value="gift">Có quà tặng</option>
        <option value="point">Có điểm rèn luyện</option>
    </select>

    <select id="timeFilter">
        <option value="">Tất cả thời gian</option>
        <option value="morning">Buổi sáng</option>
        <option value="afternoon">Buổi chiều</option>
    </select>

    <button id="resetBtn">Reset</button>
</div>
